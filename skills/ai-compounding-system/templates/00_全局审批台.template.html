<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{SYSTEM_NAME}} - 全局审批台</title>
  <link rel="stylesheet" href="assets/approval-workbench-mac.css">
</head>
<body>
  <div class="wrap">
    <h1>每日复盘自动审批入口</h1>
    <p class="sub">最新日期在前。审批结果不会自动执行，必须复制审批结果发回 Codex 后再处理。</p>
    {{DATE_ROWS}}
    <article class="date-card">
      <div>
        <h2>{{REVIEW_DATE}}</h2>
        <p>{{DATE_SUMMARY}}</p>
      </div>
      <div class="links">
        <a href="{{SINGLE_DAY_APPROVAL_HREF}}">审批台</a>
        <a href="{{APPROVAL_RESULT_HREF}}">审批结果</a>
        <a href="{{INTERNAL_REVIEW_HREF}}">内部稿</a>
        <a href="{{ASSET_SUGGESTION_HREF}}">入库建议</a>
        <a href="{{DAY_FOLDER_HREF}}">文件夹</a>
      </div>
      <span>{{STATUS}}</span>
    </article>
  </div>
</body>
</html>
